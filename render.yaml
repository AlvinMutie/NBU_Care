services:
  # Backend Web Service
  - type: web
    name: nbu-backend
    runtime: node
    plan: free
    rootDir: nbu-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: nbu-frontend
    runtime: static
    rootDir: nbu-nurse-assistant
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to your public backend URL (e.g., https://nbu-backend.onrender.com)
